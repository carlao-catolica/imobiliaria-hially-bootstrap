<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contato</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="cabecalho"></div>

    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
          <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
              <h1 class="h3 mb-3">Contato</h1>
              <p class="text-muted mb-4">
                Preencha o formulário e nossa equipe entra em contato o mais
                rápido possível.
              </p>

              <form>
                <div class="mb-3">
                  <label for="nome" class="form-label">Nome</label>
                  <input
                    type="text"
                    class="form-control"
                    id="nome"
                    placeholder="Seu nome"
                  />
                </div>
                <div class="row g-3">
                  <div class="col-md-6">
                    <label for="email" class="form-label">E-mail</label>
                    <input
                      type="email"
                      class="form-control"
                      id="email"
                      placeholder="seu@email.com"
                    />
                  </div>
                  <div class="col-md-6">
                    <label for="telefone" class="form-label">Telefone</label>
                    <input
                      type="tel"
                      class="form-control"
                      id="telefone"
                      placeholder="(11) 99999-9999"
                    />
                  </div>
                </div>
                <div class="mb-3 mt-3">
                  <label for="mensagem" class="form-label">Mensagem</label>
                  <textarea
                    class="form-control"
                    id="mensagem"
                    rows="5"
                    placeholder="Escreva sua mensagem..."
                  ></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                  Enviar mensagem
                </button>
              </form>
            </div>
          </div>

          <div class="row mt-4 g-3">
            <div class="col-12 col-md-4">
              <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                  <h6 class="fw-bold">Endereço</h6>
                  <p class="mb-0">Universidade Católica de Brasília</p>
                  <p class="mb-0">Distrito Federal, DF</p>
                </div>
              </div>
            </div>
            <div class="col-12 col-md-4">
              <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                  <h6 class="fw-bold">Telefone</h6>
                  <p class="mb-0">(61) 4002-8922</p>
                  <p class="mb-0">WhatsApp disponível</p>
                </div>
              </div>
            </div>
            <div class="col-12 col-md-4">
              <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                  <h6 class="fw-bold">E-mail</h6>
                  <p class="mb-0">contato@imobiliaria.com</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script>
      fetch("cabecalho.html")
        .then((r) => r.text())
        .then((html) => {
          document.getElementById("cabecalho").innerHTML = html;
        });
    </script>
  </body>
</html>
